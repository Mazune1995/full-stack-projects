<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Contact - Jahal Supplies Limited</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<section class="contact-hero">
  <h1>Contact <span>Us</span></h1>
  <p>We are ready to support your medical equipment needs.</p>
</section>

<section class="contact-container">

  <div class="contact-info">
    <h2>Get In Touch</h2>
    <p><strong>📞 Phone:</strong> +256 706 457514</p>
    <p><strong>📧 Email:</strong> jahalsuppliesltd@gmail.com</p>
    <p><strong>📍 Location:</strong> Mbale, Eastern Uganda</p>
  </div>

  <div class="contact-form">
    <h2>Send Message</h2>
    <form>
      <input type="text" placeholder="Your Name" required>
      <input type="email" placeholder="Your Email" required>
      <textarea rows="5" placeholder="Your Message" required></textarea>
      <button type="submit">Send Message</button>
    </form>
  </div>

</section>

</body>
</html>

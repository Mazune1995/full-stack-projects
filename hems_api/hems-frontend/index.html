<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HEMS Medical Supplies</title>

<style>

/* ===== GLOBAL ===== */
body {
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;
    background: #f4f6f9;
}

a { text-decoration: none; }

/* ===== HEADER ===== */
header {
    background: #0b3d91;
    color: white;
    padding: 15px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.logo img {
    height: 80px; /* BIGGER LOGO */
}

nav {
    display: flex;
    align-items: center;
    gap: 25px;
}

nav a {
    color: white;
    font-weight: bold;
}

/* ===== DROPDOWN PRODUCTS ===== */
.dropdown {
    position: relative;
}

.dropdown-content {
    display: none;
    position: absolute;
    background: white;
    min-width: 220px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    top: 30px;
    border-radius: 8px;
    overflow: hidden;
}

.dropdown-content a {
    color: black;
    padding: 12px;
    display: block;
}

.dropdown-content a:hover {
    background: #f1f1f1;
}

.dropdown:hover .dropdown-content {
    display: block;
}

/* ===== HERO ===== */
.hero {
    background: linear-gradient(to right, #0b3d91, #1976d2);
    color: white;
    padding: 60px 40px;
    text-align: center;
}

.hero h1 {
    font-size: 40px;
}

/* ===== PRODUCTS ===== */
.section {
    padding: 40px;
}

.products-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 25px;
}

.product-card {
    background: white;
    border-radius: 12px;
    padding: 20px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    transition: 0.3s;
}

.product-card:hover {
    transform: translateY(-5px);
}

.product-card img {
    width: 100%;
    height: 200px;
    object-fit: cover;
    border-radius: 8px;
}

.price {
    color: #0b3d91;
    font-weight: bold;
    margin-top: 10px;
}

button {
    background: #0b3d91;
    color: white;
    border: none;
    padding: 10px;
    width: 100%;
    margin-top: 10px;
    border-radius: 6px;
    cursor: pointer;
}

button:hover {
    background: #1976d2;
}

/* ===== WHATSAPP BUTTON ===== */
.whatsapp {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #25d366;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 30px;
    color: white;
}

/* ===== CHATBOT ===== */
.chatbot {
    position: fixed;
    bottom: 100px;
    right: 20px;
    width: 300px;
    background: white;
    border-radius: 10px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    display: none;
}

.chatbot-header {
    background: #0b3d91;
    color: white;
    padding: 10px;
    border-radius: 10px 10px 0 0;
}

.chatbot-body {
    padding: 15px;
}

.chatbot-toggle {
    position: fixed;
    bottom: 100px;
    left: 20px;
    background: #0b3d91;
    color: white;
    padding: 12px;
    border-radius: 50px;
    cursor: pointer;
}

.language-switch {
    background: white;
    color: black;
    padding: 5px 10px;
    border-radius: 5px;
    cursor: pointer;
}

</style>
</head>

<body>

<header>
    <div class="logo">
        <img src="logo.png" alt="Logo">
    </div>

    <nav>
        <a href="#">Home</a>

        <div class="dropdown">
            <a href="#">Products ▾</a>
            <div class="dropdown-content" id="categoriesMenu">
                <!-- Categories load here -->
            </div>
        </div>

        <a href="#">About</a>

        <div class="language-switch" onclick="switchLanguage()">
            EN / FR
        </div>
    </nav>
</header>

<section class="hero">
    <h1 id="heroText">Professional Medical Equipment</h1>
    <p>ICU • Emergency • Radiography</p>
</section>

<section class="section">
    <h2>Our Products</h2>
    <div class="products-grid" id="products"></div>
</section>

<!-- WhatsApp -->
<a href="https://wa.me/256772296415" class="whatsapp">💬</a>

<!-- Chatbot -->
<div class="chatbot-toggle" onclick="toggleChat()">Chat</div>
<div class="chatbot" id="chatbox">
    <div class="chatbot-header">Support</div>
    <div class="chatbot-body">
        Hello 👋<br>
        How can we help you?
    </div>
</div>

<script>

/* ===== LOAD PRODUCTS ===== */
fetch("http://127.0.0.1:8000/api/products/")
.then(res => res.json())
.then(data => {
    const container = document.getElementById("products");

    data.forEach(product => {
        container.innerHTML += `
            <div class="product-card">
                <img src="http://127.0.0.1:8000${product.image}" />
                <h3>${product.name}</h3>
                <div>${product.category.name}</div>
                <div class="price">${product.price} ${product.currency}</div>
                <button>Add to Cart</button>
            </div>
        `;
    });
});

/* ===== LOAD CATEGORIES ===== */
fetch("http://127.0.0.1:8000/api/categories/")
.then(res => res.json())
.then(data => {
    const menu = document.getElementById("categoriesMenu");
    data.forEach(cat => {
        menu.innerHTML += `<a href="#">${cat.name}</a>`;
    });
});

/* ===== CHAT TOGGLE ===== */
function toggleChat(){
    const box = document.getElementById("chatbox");
    box.style.display = box.style.display === "block" ? "none" : "block";
}

/* ===== LANGUAGE SWITCH ===== */
let lang = "en";
function switchLanguage(){
    const hero = document.getElementById("heroText");

    if(lang === "en"){
        hero.innerText = "Équipement Médical Professionnel";
        lang = "fr";
    } else {
        hero.innerText = "Professional Medical Equipment";
        lang = "en";
    }
}

</script>

</body>
</html>

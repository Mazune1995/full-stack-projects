{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JAHAL SUPPLIES LIMITED</title>

<style>
body{margin:0;font-family:Arial;background:#f5f7fa}
header{background:white;display:flex;justify-content:space-between;align-items:center;padding:15px 40px;box-shadow:0 2px 10px rgba(0,0,0,.08)}
.logo img{height:120px}
nav a{margin-left:25px;text-decoration:none;font-weight:bold;color:#0b5ed7}
nav a:hover{color:#28a745}
.products{padding:50px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:25px}
.card{background:white;padding:20px;border-radius:12px;box-shadow:0 5px 15px rgba(0,0,0,.05)}
.card img{width:100%;height:200px;object-fit:cover;border-radius:8px}
button{background:#0b5ed7;color:white;border:none;padding:10px 15px;border-radius:6px;cursor:pointer}
button:hover{background:#28a745}
.cart{position:fixed;right:20px;bottom:100px;background:#0b5ed7;color:white;padding:15px;border-radius:50px}
.whatsapp{position:fixed;right:20px;bottom:20px;background:#25D366;color:white;padding:15px;border-radius:50%}
.chatbot{position:fixed;left:20px;bottom:20px;background:#0b5ed7;color:white;padding:15px;border-radius:50%}
.language{margin-left:20px}
</style>
</head>
<body>

<header>
<div class="logo">
<img src="{% static 'images/logo.png' %}">
</div>

<nav>
<a href="#">Home</a>
<a href="#products">Products</a>
<a href="/admin/">Admin</a>
<select class="language" onchange="changeLang(this.value)">
<option value="en">English</option>
<option value="fr">French</option>
</select>
</nav>
</header>

<section class="products" id="products">
<h2>Our Products</h2>
<div class="grid" id="product-container"></div>
</section>

<div class="cart" onclick="viewCart()">🛒 Cart</div>

<a href="https://wa.me/256772296415" target="_blank" class="whatsapp">
💬
</a>

<div class="chatbot" onclick="alert('AI Chatbot Coming Soon!')">
🤖
</div>

<script>
let cartId = localStorage.getItem("cart_id");

if(!cartId){
fetch("/api/create-cart/",{method:"POST"})
.then(res=>res.json())
.then(data=>{
localStorage.setItem("cart_id",data.cart_id);
});
}

fetch("/api/products/")
.then(res=>res.json())
.then(data=>{
let container=document.getElementById("product-container");
data.forEach(product=>{
container.innerHTML+=`
<div class="card">
<img src="${product.image || '/media/default.jpg'}">
<h3>${product.name}</h3>
<p>${product.category.name}</p>
<p><strong>${product.price} ${product.currency}</strong></p>
<button onclick="addToCart(${product.id})">Add to Cart</button>
</div>`;
});
});

function addToCart(id){
fetch("/api/add-to-cart/",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
cart_id:localStorage.getItem("cart_id"),
product_id:id
})
}).then(()=>alert("Added to Cart"));
}

function viewCart(){
alert("Cart page coming next...");
}

function changeLang(lang){
if(lang==="fr"){
alert("French version coming soon!");
}
}
</script>

</body>
</html>

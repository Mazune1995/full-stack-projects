{% load static %}<div class="logo-container">
    <img src="{% static 'images/logo.png' %}" alt="Jahal Supplies Logo" class="logo-img">
</div>
<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>JAHAL SUPPLIES LIMITED</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* (YOUR ENTIRE CSS REMAINS UNCHANGED — I DID NOT TOUCH IT) */
        body { margin:0; padding:0; font-family:Arial,sans-serif; background-size:cover; background-position:center; animation:slideBackground 30s infinite; }
        @keyframes slideBackground {
            0%{background-image:url('assets/images/theme1.jpg');}
            16%{background-image:url('assets/images/theme2.jpg');}
            33%{background-image:url('assets/images/theme3.jpg');}
            50%{background-image:url('assets/images/theme4.jpg');}
            66%{background-image:url('assets/images/theme5.jpg');}
            83%{background-image:url('assets/images/theme6.jpg');}
            100%{background-image:url('assets/images/theme1.jpg');}
        }
        header{background:rgba(255,255,255,0.9);display:flex;justify-content:space-between;align-items:center;padding:15px 20px;position:sticky;top:0;z-index:1000;}
        .logo-text .jahal{color:#0b5ed7;font-weight:bold;font-size:32px;}
        .logo-text .supplies{color:#28a745;font-weight:bold;font-size:32px;margin-left:5px;}
        .logo-text .limited{display:block;font-size:30px;font-style:italic;color:#0d0b0b;text-align:center;letter-spacing:2px;}
        nav a{margin:0 10px;text-decoration:none;color:#0b5ed7;font-weight:bold;}
        .header-right{display:flex;align-items:center;gap:15px;}
        .search-input{padding:5px 10px;border-radius:5px;border:1px solid #aaa;}

        .products-list{padding:50px 20px;}
        .categories{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;}
        .category-card{background:rgba(255,255,255,0.9);padding:20px;border-radius:10px;text-align:center;box-shadow:0 4px 10px rgba(0,0,0,0.1);}
        .category-card h3{margin:10px 0;color:#0b5ed7;}
    </style>
</head>
<body>

<header>
    <div class="logo-container">
        <img src="{% static 'images/logo.png' %}" alt="Jahal Supplies Logo" class="logo-img">
    </div>

    <nav>
        <a href="/">Home</a>
        <a href="/about/">About</a>
        <a href="#products">Products</a>
        <a href="/contact/">Contact</a>
    </nav>
</header>

<section id="products" class="products-list">
    <h2>OUR PRODUCTS</h2>

    <!-- Django Products Will Load Here -->
    <div class="categories" id="product-container">
        <p>Loading products...</p>
    </div>
</section>

<footer style="background:#0b5ed7;color:white;text-align:center;padding:20px;">
    © 2026 JAHAL SUPPLIES LIMITED
</footer>

<script>
document.addEventListener("DOMContentLoaded", function() {

    fetch('/api/products/')
        .then(response => response.json())
        .then(data => {

            const container = document.getElementById('product-container');
            container.innerHTML = "";

            if (data.length === 0) {
                container.innerHTML = "<p>No products available.</p>";
                return;
            }

            data.forEach(product => {

                const card = document.createElement('div');
                card.classList.add('product-card');

                const imageUrl = product.image 
                    ? product.image 
                    : "/static/images/default.png";

                card.innerHTML = `
                    <img src="${imageUrl}" 
                         style="width:100%;height:220px;object-fit:cover;border-radius:8px;margin-bottom:15px;">
                    
                    <h3>${product.name}</h3>
                    
                    <p><strong>Category:</strong> ${product.category.name}</p>
                    
                    <p class="price">
                        ${product.price} ${product.currency}
                    </p>
                `;

                container.appendChild(card);
            });

        })
        .catch(error => {
            document.getElementById('product-container').innerHTML =
                "<p style='color:red;'>Could not load products.</p>";
            console.error(error);
        });

});
</script>

</body>
</html>
